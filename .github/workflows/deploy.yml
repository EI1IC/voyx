name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main  # Или 'master', если ваша главная ветка называется так
  workflow_dispatch: # Позволяет запустить сборку вручную через вкладку Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Project
        run: |
          cd frontend
          # Убедитесь, что в vite.config.js base установлен в '/название-репозитория/'
          npm run build 
          
          # Копируем содержимое dist в папку docs в корне для совместимости с настройками GH Pages
          mkdir -p ../docs
          cp -r dist/* ../docs/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v4 # Или peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs