name: CI/CD for Voyx

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # Укажите версию из requirements

    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'  # Или версия из вашего package.json

    - name: Install frontend dependencies
      run: |
        npm install  # Для корневого package.json (concurrently)

    - name: Run backend tests (placeholder)
      run: |
        cd backend
        # Добавьте тесты, например: python -m pytest
        echo "No backend tests configured"

    - name: Run frontend checks (placeholder)
      run: |
        cd frontend
        # Добавьте тесты, например: npm test (если настроите)
        echo "No frontend tests configured"

    - name: Build project
      run: |
        npm run build  # Если добавите сборку в package.json

  deploy-frontend:  # Опционально: развертывание frontend на GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend  # Папка с статическими файлами
